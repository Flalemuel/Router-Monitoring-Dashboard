<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1f3a;
      --panel:#12335f;
      --panel2:#163b6f;
      --text:#eaf3ff;
      --muted:#9db7d3;
      --accent:#2ea3ff;
      --border:#2f5d96;
      --danger:#ff6b6b;
      --success:#5ad17a;
    }
    [data-theme="light"]{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --panel2:#eaf2ff;
      --text:#10243d;
      --muted:#51657f;
      --accent:#0d6efd;
      --border:#d6e2f2;
      --danger:#dc3545;
      --success:#198754;
    }
    *{
      box-sizing:border-box;
      font-family:'Inter',Calibri,sans-serif!important;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:'Inter',Calibri,sans-serif;
    }
    button,input,select,textarea{
      font-family:'Inter',Calibri,sans-serif!important;
    }
    .wrap{
      max-width:1600px;
      margin:0 auto;
      padding:14px;
    }
    .topbar{
      background:linear-gradient(90deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      display:grid;
      grid-template-columns:220px 1fr 220px;
      gap:12px;
      align-items:center;
    }
    .logo,.hero{
      width:100%;
      height:160px;
      object-fit:contain;
      background:#fff;
      border-radius:10px;
      padding:8px;
    }
    .hero{
      object-fit:cover;
    }
    .toolbar,
    .cards,
    .split{
      display:grid;
      gap:12px;
    }
    .toolbar{
      grid-template-columns:1fr auto auto auto;
      align-items:center;
      margin-top:12px;
    }
    .btn,.inp,select{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      font-family:'Inter',Calibri,sans-serif!important;
    }
    .btn{
      cursor:pointer;
    }

    .btn.primary{
      background:var(--accent);
      border-color:transparent;
      color:#fff;
    }

    .btn.primary:hover {
      background: #0b5ed7;
      border-color: #0b5ed7;
      color:#fff;
    }

    .btn.danger{
      background:var(--danger);
      border-color:transparent;
      color:#fff;
    }
    .btn.good{
      background:var(--success);
      border-color:transparent;
      color:#fff;
    }
    .btn.good:hover{
      background:#3fa45a;
      border-color:#3fa45a;
      color:#fff;
    }
    #chart svg text {
      cursor: pointer;
    }

    #chart path {
      cursor: pointer;
    }
    #chart path ~ text {
      cursor: pointer;
    }

    .refresh-btn {
      background: #f1c40f;
      border-color: #f1c40f;
      color: #111;
    }

    .refresh-btn:hover {
      background: #d4ac0d;
      border-color: #d4ac0d;
      color: #111;
    }

    .logo-link:hover {
      cursor: pointer;
    }
    .meta{
      color:var(--muted);
      font-size:13px;
    }
    .cards{
      grid-template-columns:repeat(4,1fr);
      margin-top:12px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
    }
    .card .v{
      font-size:34px;
      font-weight:700;
    }
    .card .l{
      color:var(--muted);
    }
    .main{
      display:grid;
      grid-template-columns:0.8fr 1.0fr;
      gap:12px;
      margin-top:12px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      overflow:hidden;
    }
    .panel h3{
      margin:0 0 10px 0;
      font-size:18px;
    }
    .chartbox{
      height:300px;
    }
    .chart-layout{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      align-items:start;
    }

    .chart-side{
      padding-top:0;
    }

    .chart-stats{
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:flex-start;
      gap:6px;
      font-size:18px;
      line-height:1.2;
    }

    .chart-stats .label{
      font-weight:700;
      font-size:15px;
      margin-bottom:4px;
      min-width:52px;
    }
    .chart-stats .count{
      min-width:62px;
    }
    .footer {
      width: 100%;
      text-align: center;
      color: #888;
      font-style: italic;
      padding: 20px 0 10px;
    }
    #remarkToggle{
      background:#f1c40f;
      border-color:#f1c40f;
      color:#111;
    }
    #remarkToggle:hover {
      background:#d4ac0d;
      border-color:#d4ac0d;
      color:#111;
    }

    #remarkToggle.cancel{
      background:#e74c3c;
      border-color:#e74c3c;
      color:#fff;
    }
    #remarkToggle.cancel:hover {
      background:#c0392b;
      border-color:#c0392b;
      color:#fff;
    }
      
    .diagram-panel {
      padding: 14px;
    }
    .diagram-embed {
      width: 100%;
      height: min(900px, 78vh);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel2);
    }

    .diagram-embed iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }
    th,td{
      border:1px solid var(--border);
      padding:8px;
      vertical-align:top;
    }
    th{
      background:var(--panel2);
    }
    .tablewrap{
      overflow:auto;
      max-height:420px;
    }
    .small{
      font-size:12px;
      color:var(--muted);
    }
    .remark-input{
      width:100%;
      background:transparent;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:8px;
      padding:6px;
      font-family:'Inter',Calibri,sans-serif!important;
    }
    .split{
      grid-template-columns:1fr 1fr;
      margin-top:12px;
    }
    .remarkrow{
      display:grid;
      grid-template-columns:1fr auto auto;
      align-items:center;
      gap:10px;
    }
    #loadingLine{
      display:none;
      margin:12px 0 0 0;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:10px;
      background:rgba(46,163,255,.08);
      color:var(--muted);
      align-items:center;
      gap:10px;
    }
    .spin{
      width:16px;
      height:16px;
      border:2px solid rgba(157,183,211,.35);
      border-top-color:#2ea3ff;
      border-radius:50%;
      animation:spin .8s linear infinite;
      flex:0 0 auto;
    }
    @keyframes spin{
      to{transform:rotate(360deg)}
    }

   .mode-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .mode-btn:hover {
      background: var(--panel2);
      color: var(--text);
      border-color: var(--border);
    }
    .themebtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 44px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .themebtn:hover {
      background: var(--panel2);
      border-color: var(--border);
      color: var(--text);
    }
    .icon{
      font-size:18px;
      line-height:1;
    }

    .alarm-section {
      margin-top: 12px;
    }

    .alarm-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .alarm-table-panel {
      margin-top: 12px;
    }

    .alarm-table-wrap {
      max-height: 75vh;
      overflow: auto;
    }

    .alarm-table th,
    .alarm-table td {
      white-space: nowrap;
    }

    .alarm-table td.detail-cell {
      white-space: normal;
      word-break: break-word;
    }

    .alarm-filter {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
    }

    .alarm-chartbox {
      height: 320px;
    }


    @media(max-width:1100px){
      .topbar,.cards,.main,.split,.toolbar{
        grid-template-columns:1fr;
      }
      .logo{
          height:72px;
      }
      .hero{
          height:120px;
      }
      .alarm-grid {
          grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    const APP = { mode: 'csr', data: null, edit: false, theme: 'dark', alarms: null, alarmFilters: {} };
    google.charts.load('current', { packages: ['corechart'] });

    function api(name, args = []) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)[name](...args);
      });
    }

    function showLoading(msg) {
      loadingText.textContent = msg || 'Loading dashboard data...';
      loadingLine.style.display = 'flex';
    }
    
    function hideLoading() {
      loadingLine.style.display = 'none';
    }

    function toggleTheme() {
      APP.theme = APP.theme === 'dark' ? 'light' : 'dark';
      document.body.dataset.theme = APP.theme;
      themeIcon.textContent = APP.theme === 'dark' ? '☾' : '☀';
      // Redraw charts to pick up new text color
      if (APP.data) {
        drawChart(APP.data.summary.up, APP.data.summary.down, () => {});
      }
      if (APP.alarms) {
        drawAlarmLevelChart();
        drawAlarmTypeChart();
      }
    }

    function toggleMode() {
      APP.mode = APP.mode === 'csr' ? 'bbu' : 'csr';
      modeBtn.textContent = APP.mode === 'csr' ? 'Switch to BBU' : 'Switch to CSR';
      refreshData();
    }
    
    function refreshData() {
      showLoading('Fetching latest data...');
      Promise.all([api('dashboard', [APP.mode]), api('getAlarms', [])])
        .then(([r, alarmR]) => {
          if (!r || !r.ok) {
            hideLoading();
            alert(r && r.message ? r.message : 'Error loading dashboard');
            return;
          }
          APP.data = r;
          APP.alarms = alarmR && alarmR.ok ? alarmR : { rows: [], columns: [] };
          render();
          renderAlarms();
        })
        .catch(err => {
          hideLoading();
          alert('Dashboard error: ' + (err && err.message ? err.message : err));
        });
    }

    function reloadDiagram() {
      const iframe = document.getElementById('diagramFrame');
      const src = iframe.getAttribute('data-src') || iframe.src;
      const parts = src.split('#');
      iframe.src = parts[0] + (parts[0].includes('?') ? '&' : '?') + 't=' + Date.now() + (parts[1] ? '#' + parts[1] : '');
    }



    function render() {
      lastUpdate.textContent = 'Last update: ' + APP.data.latestTimestamp;
      windowText.textContent = 'Data Window: ' + APP.data.windowStart + ' → ' + APP.data.windowEnd;
      chartTitle.textContent = (APP.mode === 'csr' ? 'CSR' : 'BBU') + ' Status Overview';

      cards.innerHTML = `
        <div class="card"><div class="l">Up</div><div class="v" style="color:var(--success)">${APP.data.summary.up}</div></div>
        <div class="card"><div class="l">Down</div><div class="v" style="color:var(--danger)">${APP.data.summary.down}</div></div>
        <div class="card"><div class="l">Mode</div><div class="v">${APP.mode.toUpperCase()}</div></div>
        <div class="card"><div class="l">Window</div><div class="v" style="font-size:22px">1 Hour</div></div>
      `;

      drawChart(APP.data.summary.up, APP.data.summary.down, () => hideLoading());
      renderTop10();
      renderDetail();
    }

let chartObj = null;
let chartData = null;

    function drawChart(up, down, onDone) {
      google.charts.setOnLoadCallback(() => {
        try {
          chartData = google.visualization.arrayToDataTable([
            ['Status', 'Count'],
            ['Up', up],
            ['Down', down]
          ]);
  
          const options = {
            backgroundColor: 'transparent',
            legend: { position: 'right', textStyle: { color: getComputedStyle(document.body).color } },
            pieHole: 0.35,
            colors: ['#6ccf7d', '#ff7b7b'],
            chartArea: { width: '79%', height: '80%' },
            tooltip: { trigger: 'focus' },
            pieSliceText: 'none'
          };

          chartObj = new google.visualization.PieChart(document.getElementById('chart'));
          google.visualization.events.addListener(chartObj, 'select', handleChartSelect);
          chartObj.draw(chartData, options);
          updateChartStats(null);
        } catch (e) {
          console.error('Chart draw error:', e);
        } finally {
          if (onDone) onDone();
        }
      });
    }

    function handleChartSelect() {
      const sel = chartObj.getSelection();
      if (!sel || !sel.length || sel[0].row == null) {
        updateChartStats(null);
        return;
      }
      const row = sel[0].row;
      const label = chartData.getValue(row, 0);
      const count = chartData.getValue(row, 1);
      updateChartStats({ label, count });
    }

    function updateChartStats(item){
      const el = document.getElementById('chartStats');
      if (!el) return;

      const total = chartData ? chartData.getValue(0, 1) + chartData.getValue(1, 1) : 0;

      if (!item) {
        el.innerHTML = '<div style="color:var(--text);font-size:15px;font-weight:200;">Click Up or Down to see details here.</div>';
        return;
      }

      const pct = total ? ((item.count / total) * 100).toFixed(1) : '0.0';
      el.innerHTML = `<div style="color:var(--text);font-size:15px;font-weight:400;"><span style="font-weight:700;">${item.label}</span> ${item.count} sites ${pct}% of total</div>`;
    }

    
    function renderTop10() {
      let h = '<tr><th>Site_ID</th><th>City</th><th>Count</th></tr>';
      APP.data.top10.forEach(x => h += `<tr><td>${x.site_id}</td><td>${x.city}</td><td>${x.count}</td></tr>`);
      top10Table.innerHTML = h;
    }

    function renderDetail() {
      let h = '<tr><th>Timestamp</th><th>Site_ID</th><th>City</th><th>IP</th><th>Status</th><th>Remark</th></tr>';
      APP.data.detail.forEach(x => {
        h += `<tr data-key="${x.rowKey}">
          <td>${x.timestamp}</td>
          <td>${x.site_id}</td>
          <td>${x.city}</td>
          <td>${x.ip || ''}</td>
          <td>${x.status}</td>
          <td>${APP.edit ? `<input class="remark-input" value="${escapeHtml(x.remark || '')}">` : (x.remark || '')}</td>
        </tr>`;
      });
      detailTable.innerHTML = h;
    }

  

    function toggleRemarksEdit() {
      APP.edit = !APP.edit;
      remarkToggle.textContent = APP.edit ? 'Cancel Remark Edit' : 'Update Remark';
      remarkToggle.classList.toggle('cancel', APP.edit);
      saveRemarkBtn.classList.toggle('hide', !APP.edit);
      renderDetail();
    }

    function saveAllRemarks() {
      showLoading('Saving remarks...');

      const rows = [...detailTable.querySelectorAll('tr[data-key]')];
      const updatedRows = rows.map(tr => {
        const cells = [...tr.querySelectorAll('td')];
        return [
          cells[0].textContent,
          cells[1].textContent,
          cells[2].textContent,
          cells[3].textContent,
          cells[4].textContent,
          tr.querySelector('input') ? tr.querySelector('input').value : cells[5].textContent
        ];
      });

      api('saveRemarksTable', [updatedRows])
        .then(() => {
          APP.edit = false;
          saveRemarkBtn.classList.add('hide');
          remarkToggle.classList.remove('cancel');
          remarkToggle.textContent = 'Update Remark';
          refreshData();
        })  
        .catch(err => {
          hideLoading();
          alert('Save error: ' + (err && err.message ? err.message : err));
        });
    }



    function themeTextColor() {
      const v = getComputedStyle(document.body)
        .getPropertyValue('--text').trim();
      return v || (APP.theme === 'dark' ? '#eaf3ff' : '#10243d');
    }

    function renderAlarms() {
      if (!APP.alarms || !APP.alarms.rows) return;
      drawAlarmLevelChart();
      drawAlarmTypeChart();
      renderAlarmTable();
    }

    function drawAlarmLevelChart() {
      const data = APP.alarms.levelCounts || {};
      const order = ['alerts', 'warnings', 'emergencies', 'critical'];
      const labels = {
        alerts: 'Alerts', warnings: 'Warnings',
        emergencies: 'Emergencies', critical: 'Critical'
      };
      const colors = {
        alerts: '#f1c40f', warnings: '#5bc0de',
        emergencies: '#0d6efd', critical: '#dc3545'
      };
      const total = Object.values(data).reduce((a, b) => a + b, 0) || 1;
      const rows = [['Level', 'Count', { role: 'style' },
        { role: 'tooltip', type: 'string', p: { html: true } }]];

      order.forEach(k => {
        const count = data[k] || 0;
        const pct = ((count / total) * 100).toFixed(1);
        rows.push([
          labels[k], count,
          'color: ' + colors[k],
          '<div style="padding:6px 10px;color:#111;font-size:13px;background:#fff;' +
          'border:1px solid #ccc;border-radius:4px;">' +
          '<b>' + labels[k] + '</b><br>Total: ' + count + ' (' + pct + '%)</div>'
        ]);
      });

      const chartData = google.visualization.arrayToDataTable(rows);
      const tc = themeTextColor();
      const options = {
        backgroundColor: 'transparent',
        legend: 'none',
        tooltip: { isHtml: true },
        chartArea: { left: 60, top: 20, width: '80%', height: '70%' },
        hAxis: { minValue: 0, textStyle: { color: tc } },
        vAxis: { textStyle: { color: tc } },
        bar: { groupWidth: '60%' }
      };

      const el = document.getElementById('alarmLevelChart');
      new google.visualization.ColumnChart(el).draw(chartData, options);
    }

    function drawAlarmTypeChart() {
      const data = APP.alarms.moduleCounts || {};
      const entries = Object.entries(data);
      const total = entries.reduce((a, b) => a + b[1], 0) || 1;
      const palette = ['#6f42c1','#20c997','#fd7e14','#6c757d','#e83e8c',
                      '#198754','#0dcaf0','#ffc107','#6610f2','#adb5bd'];
      const rows = [['Module', 'Count', { role: 'style' },
        { role: 'tooltip', type: 'string', p: { html: true } }]];

      entries.forEach(([name, count], i) => {
        const pct = ((count / total) * 100).toFixed(1);
        rows.push([
          name, count,
          'color: ' + palette[i % palette.length],
          '<div style="padding:6px 10px;color:#111;font-size:13px;background:#fff;' +
          'border:1px solid #ccc;border-radius:4px;">' +
          '<b>' + name + '</b><br>Total: ' + count + ' (' + pct + '%)</div>'
        ]);
      });

      const chartData = google.visualization.arrayToDataTable(rows);
      const tc = themeTextColor();
      const options = {
        backgroundColor: 'transparent',
        legend: 'none',
        tooltip: { isHtml: true },
        chartArea: { left: 60, top: 20, width: '80%', height: '70%' },
        hAxis: { slantedText: true, slantedTextAngle: 35, textStyle: { color: tc } },
        vAxis: { textStyle: { color: tc } },
        bar: { groupWidth: '60%' }
      };

      const el = document.getElementById('alarmTypeChart');
      new google.visualization.ColumnChart(el).draw(chartData, options);
    }

    function renderAlarmTable() {
      const rows = (APP.alarms && APP.alarms.rows) ? APP.alarms.rows.slice() : [];
      const cols = ['Hostname', 'Host', 'ID', 'Code', 'Level', 'Time', 'Module', 'Detail'];
      const head = document.getElementById('alarmTableHead');
      const body = document.getElementById('alarmTableBody');
      if (!head || !body) return;

      const unique = {};
      cols.forEach(c => {
        unique[c] = [...new Set(rows.map(r => String(r[c] || '').trim()).filter(Boolean))].sort();
      });

      let h = '<tr>';
      cols.forEach(c => {
        h += '<th>' + c + '<br><select class="alarm-filter" data-col="' + c + '"><option value="">All</option>' +
          unique[c].map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') +
          '</select></th>';
      });
      h += '</tr>';
      head.innerHTML = h;

      body.innerHTML = rows.map((r, i) =>
        '<tr data-row="' + i + '">' +
        cols.map(c => {
          const cls = c === 'Detail' ? ' class="detail-cell"' : '';
          return '<td' + cls + '>' + escapeHtml(r[c] == null ? '' : String(r[c])) + '</td>';
        }).join('') +
        '</tr>'
      ).join('');

      head.querySelectorAll('select.alarm-filter').forEach(sel => {
        sel.value = APP.alarmFilters[sel.dataset.col] || '';
        sel.onchange = () => {
          APP.alarmFilters[sel.dataset.col] = sel.value;
          applyAlarmFilters();
        };
      });

      applyAlarmFilters();
    }

    function applyAlarmFilters() {
      const cols = ['Hostname', 'Host', 'ID', 'Code', 'Level', 'Time', 'Module', 'Detail'];
      const body = document.getElementById('alarmTableBody');
      if (!body) return;

      const rows = [...body.querySelectorAll('tr')];
      rows.forEach(tr => {
        const tds = [...tr.querySelectorAll('td')];
        let show = true;
        cols.forEach((c, i) => {
          const f = String(APP.alarmFilters[c] || '').trim().toLowerCase();
          if (f && String(tds[i].textContent || '').toLowerCase().indexOf(f) === -1) show = false;
        });
        tr.style.display = show ? '' : 'none';
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    window.addEventListener('load', () => {
      refreshData();
  
    });
  </script>
</body>
</html>
